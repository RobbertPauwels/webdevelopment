
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Colorpicker</title>
    <link rel="stylesheet" href="CSS/Colorpicker.css" />
    <script src="Scripts/Colorpicker.js" defer></script>
</head>
<body>
<main>
    <div class="controls">
        <label>R: <output id="rOut">128</output></label>
        <input class="slider" id="r" type="range" min="0" max="255" value="128" />

        <label>G: <output id="gOut">128</output></label>
        <input class="slider" id="g" type="range" min="0" max="255" value="128" />

        <label>B: <output id="bOut">128</output></label>
        <input class="slider" id="b" type="range" min="0" max="255" value="128" />
    </div>

    <div class="swatch" id="swatch" aria-label="kleurstaal"></div>
    <p>Huidige kleur: <code id="rgbText">rgb(128, 128, 128)</code></p>
</main>
</body>
</html>
