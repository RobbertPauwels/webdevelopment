<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invulformulier</title>
</head>
<body>
<form>
    <fieldset>
        <legend>Persoonlijke informatie</legend>
        <label for="voornaam">Voornaam:*</label>
        <input type="text" id="voornaam" name="voornaam" placeholder="Your first name" required autofocus>
        <br><br>
        <label for="familienaam">Familienaam:*</label>
        <input type="text" id="familienaam" name="familienaam" placeholder="Your last name" required>
    </fieldset>
    <br>
    <fieldset>
        <legend>Sport</legend>
        <p>Welke sport beoefen je?</p>
        <label><input type="checkbox" name="sport" value="lopen"> Lopen</label><br>
        <label><input type="checkbox" name="sport" value="zwemmen"> Zwemmen</label><br>
        <label><input type="checkbox" name="sport" value="roeien"> Roeien</label><br>
    </fieldset>
    <br>
    <fieldset>
        <legend>Communicatievoorkeur</legend>
        <p>Hoe kunnen we je bereiken?</p>
        <label><input type="radio" name="contact" value="post"> Per post</label><br>
        <label><input type="radio" name="contact" value="email"> E-mail</label>
    </fieldset>
    <br>
    <fieldset>
        <legend>Favorieten</legend>
        <label for="film">Favoriete film:</label>
        <input type="text" id="film" name="film">
        <br><br>
        <label for="quote">Favoriete quote:</label>
        <textarea id="quote" name="quote" placeholder="Schrijf je favoriete quote"></textarea>
        <br><br>
        <label for="eten">Favoriete eten:</label>
        <select id="eten" name="eten">
            <option>Hamburger</option>
            <option>Hot-dog</option>
            <option>Pizza</option>
        </select>
        <br><br>
        <label for="browser">Favoriete browser:</label>
        <input type="text" id="browser" name="browser">
    </fieldset>
    <br>
    <fieldset>
        <legend>Beveiliging &amp; contact</legend>
        <label for="wachtwoord">Wachtwoord:*</label>
        <input type="password" id="wachtwoord" name="wachtwoord" required>
        <br><br>
        <label for="email">E-mailadres:*</label>
        <input type="email" id="email" name="email" required placeholder="Geef je e-mailadres in">
        <br><br>
        <label for="site">Favoriete site:</label>
        <input type="url" id="site" name="site" placeholder="Geef de URL van je favoriete site">
    </fieldset>
    <br>
    <fieldset>
        <legend>Extra informatie</legend>
        <label for="getal1">Favoriete getal tussen 1-10:</label>
        <input type="number" id="getal1" name="getal1" min="1" max="10">
        <br><br>
        <label for="getal2">Favoriete getal tussen 11-100:</label>
        <input type="number" id="getal2" name="getal2" min="11" max="100">
        <br><br>
        <label for="geboorte">Wanneer ben je geboren?</label>
        <input type="date" id="geboorte" name="geboorte">
        <br><br>
        <label for="postcode">Belgische postcode:*</label>
        <input
                type="text"
                id="postcode"
                name="postcode"
                placeholder="9992"
                pattern="([1-8][0-9]{3}|9[0-8][0-9]{2}|99[0-8][0-9]|999[0-2])"
                title="Postcode moet uit 4 cijfers (1–9) bestaan, minimaal 1000 zijn en maximaal 9992."
                required
        >
    </fieldset>
    <br>
    <fieldset>
        <legend>Varia</legend>
        <label for="search">Zoeken naar iets:</label>
        <input type="search" id="search" name="search">
        <br><br>
        <label for="kleur">Wat is je lievelingskleur?</label>
        <input type="color" id="kleur" name="kleur">
        <br><br>
        <label for="bestand">Upload een bestand:</label>
        <input type="file" id="bestand" name="bestand">
    </fieldset>
    <br>
    <button type="submit">Submit</button>
</form>

</body>
</html>
